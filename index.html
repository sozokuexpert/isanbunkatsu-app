<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遺産分割協議書 作成ツール</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
  font-size:14px;color:#1a1a18;
  background:#b2d3a5 !important;
  min-height:100vh;
}
:root{
  --bg:#fff;--bg2:#f5f4f0;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);
  --text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;
  --info-bg:#e6f1fb;--info:#185fa5;
  --success:#3b6d11;--radius:8px;--radius-lg:12px;
}
.app-header{background:var(--bg);border-bottom:.5px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:8px;flex-wrap:wrap}
.app-header h1{font-size:15px;font-weight:600}
.app-header p{font-size:11px;color:var(--text2);margin-top:1px}
.header-actions{display:flex;gap:6px;flex-wrap:wrap}
.app-body{display:flex;height:calc(100vh - 54px);overflow:hidden}
.sidebar{width:490px;min-width:300px;max-width:52vw;background:var(--bg);border-right:.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.preview-pane{flex:1;overflow-y:auto;background:var(--bg2);padding:18px 20px}
.section{border-bottom:.5px solid var(--border)}
.section-header{padding:11px 15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--bg);user-select:none}
.section-header:hover{background:var(--bg2)}
.section-label{font-size:13px;font-weight:500}
.section-meta{display:flex;align-items:center;gap:8px}
.badge{font-size:11px;background:var(--info-bg);color:var(--info);padding:2px 7px;border-radius:10px}
.chevron{font-size:11px;color:var(--text3);transition:transform .2s;display:inline-block}
.chevron.open{transform:rotate(180deg)}
.section-body{display:none;padding:10px 14px 14px}
.section-body.open{display:block}
.field{margin-bottom:9px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:7px 9px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit}
.field textarea{resize:vertical;min-height:75px;line-height:1.6}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--info);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.note-text{font-size:11px;color:var(--text2);margin:4px 0}
.sub-section{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.sub-section-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em}
.item-card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:10px 13px;margin-bottom:7px;position:relative}
.item-card.inside{background:var(--bg)}
.item-num{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:7px}
.remove-btn{position:absolute;top:9px;right:11px;cursor:pointer;color:var(--text3);font-size:18px;border:none;background:none;padding:0;line-height:1}
.remove-btn:hover{color:#e24b4a}
.add-btn{width:100%;padding:8px;border:.5px dashed var(--border2);border-radius:var(--radius);background:none;color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;margin-top:2px}
.add-btn:hover{background:var(--bg2);color:var(--text);border-style:solid}
.hs-row{display:flex;gap:7px;align-items:flex-end;margin-bottom:6px}
.hs-row .field{flex:1;margin-bottom:0}
.hs-row .rm-s{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.hs-row .rm-s:hover{color:#e24b4a}
.action-bar{padding:10px 14px;border-top:.5px solid var(--border);background:var(--bg);display:flex;gap:7px;flex-wrap:wrap}
.btn{padding:8px 14px;border-radius:var(--radius);border:.5px solid var(--border2);cursor:pointer;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}
.btn:hover{background:var(--bg2)}
.btn-word{background:#185fa5;color:#fff;border-color:#185fa5}
.btn-word:hover{background:#0c447c}
.preview-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.preview-label::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.doc-paper{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:32px 36px;max-width:700px;margin:0 auto;font-size:13px;line-height:2;min-height:500px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.doc-title{text-align:center;font-size:20px;font-weight:600;margin-bottom:22px;letter-spacing:4px}
.doc-info-table{width:100%;margin-bottom:20px;border-collapse:collapse}
.doc-info-table td{padding:3px 0;vertical-align:top;font-size:13px;line-height:1.8}
.doc-info-table td:first-child{width:100px;color:var(--text2);white-space:nowrap;font-weight:500}
.article{margin-bottom:16px}
.article-title{font-weight:600;margin-bottom:4px;font-size:13px}
.article-body{padding-left:1.5em;line-height:1.9;font-size:13px;color:var(--text2);white-space:pre-wrap}
.doc-end{text-align:right;margin:18px 0 0;font-weight:500}
.page-break{text-align:center;color:var(--text3);font-size:11px;border-top:.5px dashed var(--border);padding-top:8px;margin:26px 0 18px}
.sig-date{text-align:left;font-size:13px;margin-bottom:22px}
.sig-item{margin-bottom:20px;text-align:right}
.sig-addr{font-size:13px;color:var(--text2);margin-bottom:2px}
.sig-name-row{display:flex;align-items:center;justify-content:flex-end;gap:10px;font-size:13px}
.seal{display:inline-flex;width:32px;height:32px;border:1px solid var(--border2);border-radius:50%;align-items:center;justify-content:center;font-size:11px;color:var(--text3);flex-shrink:0}
.disclaimer{margin-top:18px;padding:14px 16px;background:var(--bg2);border-radius:var(--radius);font-size:11.5px;color:var(--text2);line-height:1.8}
.disclaimer h4{font-size:12px;font-weight:600;text-align:center;margin-bottom:8px;color:var(--text)}
.disclaimer ol{padding-left:1.4em}
.disclaimer li{margin-bottom:4px}
.footer-guide{margin-top:32px;text-align:center}
.footer-guide p{font-size:13px;color:var(--text2);line-height:2.2;margin-bottom:24px}
.footer-guide img{max-width:70%;width:70%;display:block;margin:0 auto}
.empty-hint{text-align:center;color:var(--text3);font-size:13px;padding:40px 20px}
.save-ind{font-size:11px;color:var(--text3);padding:4px 8px;display:flex;align-items:center;gap:4px}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
.multi-wrap{border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);padding:6px 8px;max-height:110px;overflow-y:auto}
.multi-wrap label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text);padding:2px;cursor:pointer}
@media print{
  .sidebar,.app-header,.preview-label,.save-ind{display:none!important}
  .app-body{height:auto;display:block}
  .preview-pane{padding:0;background:#fff}
  .doc-paper{border:none;box-shadow:none;padding:20px;max-width:100%}
  .page-break{page-break-before:always;border:none}
}
@media(max-width:768px){
  .app-body{flex-direction:column;height:auto;overflow:visible}
  .sidebar{width:100%;max-width:100%;height:auto}
  .preview-pane{padding:14px}
  .doc-paper{padding:18px 15px}
}
</style>
</head>
<body>
<input type="hidden" id="d-docdate">

<header class="app-header">
  <div>
    <h1>遺産分割協議書 作成ツール</h1>
    <p>情報を入力すると右側にリアルタイムでプレビューが表示されます</p>
  </div>
  <div class="header-actions">
    <div class="save-ind"><span class="save-dot"></span>自動保存</div>
    <button class="btn btn-word" onclick="downloadWord()">&#128196; Wordで保存</button>
    <button class="btn" onclick="window.print()">&#128424; 印刷・PDF</button>
    <button class="btn" onclick="resetAll()">リセット</button>
  </div>
</header>

<div class="app-body">
  <div class="sidebar">
    <div class="sidebar-scroll">

      <div class="section">
        <div class="section-header" onclick="toggleSec('deceased')">
          <span class="section-label">被相続人情報</span>
          <div class="section-meta"><span class="badge">必須</span><span class="chevron open" id="chev-deceased">&#9662;</span></div>
        </div>
        <div class="section-body open" id="body-deceased">
          <div class="field"><label>氏名 *</label><input type="text" id="d-name" placeholder="田中一郎" oninput="go()"></div>
          <div class="field"><label>本籍地</label><input type="text" id="d-honseki" placeholder="東京都渋谷区渋谷１－１－１" oninput="go()"></div>
          <div class="field"><label>最後の住所</label><input type="text" id="d-address" placeholder="東京都渋谷区渋谷１－１－１" oninput="go()"></div>
          <div class="field"><label>死亡年月日</label><input type="date" id="d-death" oninput="go()"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-header" onclick="toggleSec('heirs')">
          <span class="section-label">相続人</span>
          <div class="section-meta"><span class="badge">1名以上必要</span><span class="chevron open" id="chev-heirs">&#9662;</span></div>
        </div>
        <div class="section-body open" id="body-heirs">
          <div id="heirs-list"></div>
          <button class="add-btn" onclick="addHeir()">＋ 相続人を追加</button>
        </div>
      </div>

      <div class="section">
        <div class="section-header" onclick="toggleSec('bank')">
          <span class="section-label">預貯金</span>
          <span class="chevron" id="chev-bank">&#9662;</span>
        </div>
        <div class="section-body" id="body-bank">
          <div class="sub-section">
            <div class="sub-section-title">A. 口座情報</div>
            <div id="bank-list"></div>
            <button class="add-btn" onclick="addBank()">＋ 口座を追加</button>
          </div>
          <div class="sub-section" style="margin-top:10px">
            <div class="sub-section-title">B. 取得者・割合（全口座まとめて）</div>
            <p class="note-text">全口座をまとめて誰が何割取得するか設定します。</p>
            <div id="bh-list"></div>
            <button class="add-btn" onclick="addBH()">＋ 取得者を追加</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-header" onclick="toggleSec('realestate')">
          <span class="section-label">不動産</span>
          <span class="chevron" id="chev-realestate">&#9662;</span>
        </div>
        <div class="section-body" id="body-realestate">
          <div id="re-list"></div>
          <button class="add-btn" onclick="addRE()">＋ 不動産を追加</button>
        </div>
      </div>

      <div class="section">
        <div class="section-header" onclick="toggleSec('other')">
          <span class="section-label">その他の遺産</span>
          <span class="chevron" id="chev-other">&#9662;</span>
        </div>
        <div class="section-body" id="body-other">
          <div id="ot-list"></div>
          <button class="add-btn" onclick="addOT()">＋ その他の遺産を追加</button>
        </div>
      </div>

      <div class="section">
        <div class="section-header" onclick="toggleSec('future')">
          <span class="section-label">後日判明財産</span>
          <span class="chevron" id="chev-future">&#9662;</span>
        </div>
        <div class="section-body" id="body-future">
          <div id="fu-list"></div>
          <button class="add-btn" onclick="addFU()">＋ 後日判明財産を追加</button>
        </div>
      </div>

    </div>
    <div class="action-bar">
      <button class="btn btn-word" onclick="downloadWord()">&#128196; Wordで保存</button>
      <button class="btn" onclick="window.print()">&#128424; 印刷・PDF</button>
      <button class="btn" onclick="resetAll()">リセット</button>
    </div>
  </div>

  <div class="preview-pane">
    <div class="preview-label">リアルタイムプレビュー</div>
    <div class="doc-paper" id="doc-paper">
      <div class="empty-hint">左のフォームに情報を入力すると、ここに協議書が表示されます</div>
    </div>
  </div>
</div>

/* ---- ユーティリティ ---- */
function esc(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function kanji(n){
  var k=["","一","二","三","四","五","六","七","八","九","十","十一","十二","十三","十四","十五"];
  return k[n]||String(n);
}
function getNames(){
  return heirs.map(function(h,i){ return h.n || ("相続人"+(i+1)); });
}
function jdate(v){
  if(!v) return "";
  var d=new Date(v);
  if(isNaN(d.getTime())) return v;
  var y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
  var era, yr;
  if(y>=2019){era="令和";yr=y-2018;}
  else if(y>=1989){era="平成";yr=y-1988;}
  else if(y>=1926){era="昭和";yr=y-1925;}
  else{era="大正";yr=y-1911;}
  return era+(yr===1?"元":yr)+"年"+m+"月"+day+"日";
}

/* ============================================================
   相続人
   FIX: oninput で renderHeirs() を呼ばない
        → updateHeirField(idx, field, val) で state だけ更新して go()
   ============================================================ */
function addHeir(){
  heirs.push({n:"",a:""});
  renderHeirs();
  go();
}
function rmHeir(i){
  heirs.splice(i,1);
  renderHeirs();
  renderBH(); renderRE(); renderOT(); renderFU();
  go();
}
function updateHeirField(i, field, val){
  /* field: 0=name(n), 1=address(a) */
  if(field===0){ heirs[i].n=val; renderBH(); renderRE(); renderOT(); renderFU(); }
  else { heirs[i].a=val; }
  go();
}
function renderHeirs(){
  var el=document.getElementById("heirs-list");
  if(!heirs.length){el.innerHTML="";return;}
  var h="";
  for(var i=0;i<heirs.length;i++){
    h += "<div class='item-card'>";
    h += "<div class='item-num'>相続人 "+(i+1)+"</div>";
    h += "<button class='remove-btn' onclick='rmHeir("+i+")'>&#215;</button>";
    /* ★ oninput は updateHeirField() のみ呼ぶ → DOM再構築しない */
    h += "<div class='field'><label>氏名</label>";
    h += "<input type='text' id='heir-n-"+i+"' value='"+esc(heirs[i].n)+"' placeholder='相続一郎' ";
    h += "oninput='updateHeirField("+i+",0,this.value)'></div>";
    h += "<div class='field'><label>住所</label>";
    h += "<input type='text' id='heir-a-"+i+"' value='"+esc(heirs[i].a)+"' placeholder='東京都渋谷区〇〇' ";
    h += "oninput='updateHeirField("+i+",1,this.value)'></div>";
    h += "</div>";
  }
  el.innerHTML=h;
}

/* ============================================================
   チェックボックス マルチセレクト
   ============================================================ */
function mkCheck(ns, sel, cbStr){
  if(!ns.length) return "<div class='note-text'>先に相続人を追加してください</div>";
  var h="<div class='multi-wrap'>";
  for(var i=0;i<ns.length;i++){
    var chk = (sel.indexOf(ns[i])>=0) ? "checked" : "";
    h += "<label><input type='checkbox' value='"+esc(ns[i])+"' "+chk+" onchange='"+cbStr+"'> "+esc(ns[i])+"</label>";
  }
  return h+"</div>";
}
function getChk(el){
  var boxes=el.querySelectorAll("input[type=checkbox]:checked");
  var r=[];
  for(var i=0;i<boxes.length;i++) r.push(boxes[i].value);
  return r;
}

/* ============================================================
   条文生成
   ============================================================ */
function buildArts(){
  var arts=[], no=1;
  var fb=banks.filter(function(b){return b.bk||b.nm;});
  var fbh=bh.filter(function(x){return x.h;});
  if(fb.length||fbh.length){
    var body="";
    if(fbh.length){
      body = fbh.map(function(x){return x.r ? x.h+"　"+x.r : x.h;}).join("、") + "が取得する。\n";
    } else {
      body = "（取得者未設定）が取得する。\n";
    }
    fb.forEach(function(b){
      var p=[b.bk,b.br,b.tp,b.nm].filter(Boolean);
      if(p.length) body += "　"+p.join("　")+"\n";
    });
    arts.push({no:no++, title:"預貯金", body:body.replace(/\n$/,"")});
  }
  re.forEach(function(x){
    if((x.hs&&x.hs.length)||x.info){
      var htext = x.hs&&x.hs.length ? x.hs.join("及び") : "（取得者未設定）";
      var rt = x.rt ? "（"+x.rt+"）" : "";
      var body = htext+rt+"が取得する。";
      if(x.info) body += "\n"+x.info;
      arts.push({no:no++, title:"不動産", body:body});
    }
  });
  ot.forEach(function(x){
    if(x.c||(x.hs&&x.hs.length)){
      var htext = x.hs&&x.hs.length ? x.hs.join("及び") : "（取得者未設定）";
      arts.push({no:no++, title:"その他の遺産", body:(x.c?x.c+"は":"")+htext+"が取得する。"});
    }
  });
  fu.forEach(function(x){
    if(x.c||(x.hs&&x.hs.length)){
      var htext = x.hs&&x.hs.length ? x.hs.join("及び") : "（取得者未設定）";
      arts.push({no:no++, title:"後日判明した財産", body:(x.c||"後日判明した財産")+"は"+htext+"が取得する。"});
    }
  });
  return arts;
}

/* ============================================================
   自動保存 / 復元
   ============================================================ */
var _ast=null;
function autosave(){
  if(_ast) clearTimeout(_ast);
  _ast=setTimeout(function(){
    try{
      localStorage.setItem(SK, JSON.stringify({
        nm:document.getElementById("d-name").value,
        hk:document.getElementById("d-honseki").value,
        ad:document.getElementById("d-address").value,
        dt:document.getElementById("d-death").value,
        dd:document.getElementById("d-docdate").value,
        heirs:heirs, banks:banks, bh:bh, re:re, ot:ot, fu:fu
      }));
    }catch(e){}
  }, 800);
}
function loadSaved(){
  try{
    var raw=localStorage.getItem(SK);
    if(!raw) return false;
    var d=JSON.parse(raw);
    document.getElementById("d-name").value    = d.nm||"";
    document.getElementById("d-honseki").value = d.hk||"";
    document.getElementById("d-address").value = d.ad||"";
    document.getElementById("d-death").value   = d.dt||"";
    document.getElementById("d-docdate").value = d.dd||"";
    heirs=d.heirs||[]; banks=d.banks||[]; bh=d.bh||[];
    re=d.re||[]; ot=d.ot||[]; fu=d.fu||[];
    return true;
  }catch(e){return false;}
}

/* ============================================================
   Wordダウンロード（RTF形式）
   FIX: バックスラッシュを正しく1本だけ出力する
   ============================================================ */
function rtfEsc(s){
  var BS="\\";
  var o="";
  for(var i=0;i<s.length;i++){
    var c=s.charCodeAt(i);
    if(c===92) o+=BS+BS;
    else if(c===123) o+=BS+"{";
    else if(c===125) o+=BS+"}";
    else if(c<128) o+=s[i];
    else o+=BS+"u"+c+"?";
  }
  return o;
}

function rtfPara(text, opts){
  opts = opts||{};
  var s = "\pard";
  s += opts.c ? "\qc" : opts.r ? "\qr" : "\ql";
  if(opts.b) s += "\b";
  s += "\fs"+(opts.sz||24)+" "+rtfEsc(text);
  if(opts.b) s += "\b0";
  return s+"\par\n";
}
function downloadWord(){
  var nm = document.getElementById("d-name").value.trim()||"被相続人";
  var hk = document.getElementById("d-honseki").value.trim();
  var ad = document.getElementById("d-address").value.trim();
  var dt = jdate(document.getElementById("d-death").value);
  var dd = jdate(document.getElementById("d-docdate").value);
  var arts = buildArts();

  var r = "{\rtf1\ansi\ansicpg932\deff0\n";
  r += "{\fonttbl{\f0\fnil\fcharset128 MS Mincho;}}\n";
  r += "\paperw11906\paperh16838\margl1701\margr1701\margt1134\margb1134\n";
  r += rtfPara("遺産分割協議書", {c:true,b:true,sz:36});
  r += rtfPara("", {});
  if(nm) r += rtfPara("被相続人　"+nm, {});
  if(hk) r += rtfPara("本籍地　　"+hk, {});
  if(ad) r += rtfPara("住所　　　"+ad, {});
  if(dt) r += rtfPara("死亡年月日　"+dt, {});
  r += rtfPara("", {});
  arts.forEach(function(a){
    r += rtfPara("第"+kanji(a.no)+"条　"+a.title, {b:true});
    a.body.split("\n").forEach(function(l){ r += rtfPara("\u3000"+l, {}); });
    r += rtfPara("", {});
  });
  r += rtfPara("以上", {r:true});
  r += "\page\n";
  if(dd) r += rtfPara(dd, {});
  r += rtfPara("", {});
  heirs.forEach(function(heir){
    if(heir.a) r += rtfPara("【住所】"+heir.a, {r:true});
    if(heir.n) r += rtfPara("【氏名】"+heir.n+"　　　　㊞", {r:true});
    r += rtfPara("", {});
  });
  r += "\page\n";
  r += rtfPara("必ずお読みください（免責事項）", {c:true,b:true});
  r += rtfPara("", {});
  r += rtfPara("この遺産分割協議書作成フォームは、多くの方に対して簡易迅速に遺産分割協議書の下書きを作成することを目的としているため、正確ではありません。あくまで参考程度にとどめて、相続問題に精通した専門家にご相談されるようにしてください。", {});
  r += rtfPara("１．すべての遺産を対象にできていない可能性があります。", {});
  r += rtfPara("２．遺産の時価評価については専門家による査定を踏まえて進めることをお勧めします。", {});
  r += rtfPara("３．その他、例外的な事案や個別事情を考慮していません。", {});
  r += rtfPara("４．本フォームを利用されたことにより生じた不利益な結果や損害などについては、一切責任を負いかねますので予めご了承ください。", {});
  r += rtfPara("", {});
  r += rtfPara("相続問題でお困りの方は、日本全国合計100名超の行政書士・司法書士・税理士と提携している一般社団法人相続手続士業の会にお気軽にご相談ください。", {c:true});
  r += "}";

  var blob = new Blob([r], {type:"application/rtf"});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement("a");
  a.href   = url;
  a.download = "遺産分割協議書_"+nm+".rtf";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
